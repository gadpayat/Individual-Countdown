<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Individual Project Completion Countdown</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
    margin:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#222;
}

th{
    background:#c62828;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    text-align:center;
    border:1px solid #444;
}

tr:nth-child(even){
    background:#2a2a2a;
}

.status{
    font-weight:bold;
}

.completed{
    color:#00ff66;
}

.ongoing{
    color:#ffcc00;
}

.delayed{
    color:#ff4444;
}
</style>
</head>
<body>

<h1>Individual Project Completion Countdown</h1>

<table>
<thead>
<tr>
<th>Barangay</th>
<th>Start Date</th>
<th>Completion Date</th>
<th>Days Remaining</th>
<th>% Time Elapsed</th>
<th>Status</th>
</tr>
</thead>

<tbody id="projectTable"></tbody>

</table>

<script>

const projects = [

{
barangay:"Ba-i, Lagayan",
start:"2025-01-15",
end:"2026-10-31"
},
{
barangay:"Collago, Lagayan",
start:"2025-02-01",
end:"2026-09-15"
},
{
barangay:"Pang-ot, Lagayan",
start:"2025-03-01",
end:"2026-08-30"
},
{
barangay:"Poblacio, Lagayan",
start:"2025-01-20",
end:"2026-11-15"
},
{
barangay:"Pulot, Lagayan",
start:"2025-02-10",
end:"2026-12-01"
},
{
barangay:"Bulbulala, La Paz",
start:"2025-03-05",
end:"2026-10-20"
},
{
barangay:"Buli, La Paz",
start:"2025-01-10",
end:"2026-11-30"
},
{
barangay:"Canan, La Paz",
start:"2025-02-15",
end:"2026-09-30"
},
{
barangay:"Udangan, La Paz",
start:"2025-01-25",
end:"2026-08-15"
},
{
barangay:"Garreta, Pidigan",
start:"2025-03-01",
end:"2026-10-31"
},
{
barangay:"Immuli, Pidigan",
start:"2025-02-20",
end:"2026-12-15"
},
{
barangay:"Monggoc, Pidigan",
start:"2025-01-05",
end:"2026-11-01"
},
{
barangay:"Naguirayan, Pidigan",
start:"2025-03-10",
end:"2026-09-20"
},
{
barangay:"Pamutic, Pidigan",
start:"2026-01-18",
end:"2026-4-30"
},
{
barangay:"San Diego, Pidigan",
start:"2025-02-25",
end:"2026-12-31"
},
{
barangay:"Sulbec, Pidigan",
start:"2025-03-15",
end:"2026-11-20"
}

];

function updateTable(){

const table = document.getElementById("projectTable");
table.innerHTML="";

const now = new Date();

projects.forEach(project=>{

const start = new Date(project.start);
const end = new Date(project.end);

const totalDuration = end - start;
const elapsed = now - start;

const percent =
Math.min(
100,
Math.max(
0,
(elapsed / totalDuration) * 100
)
).toFixed(1);

const remaining =
Math.ceil(
(end - now)/(1000*60*60*24)
);

let statusClass="";
let statusText="";

if(remaining < 0){
statusClass="ended";
statusText="Ended";
}
else{
statusClass="ongoing";
statusText="Ongoing";
}

table.innerHTML += `
<tr>
<td>${project.barangay}</td>
<td>${project.start}</td>
<td>${project.end}</td>
<td>${remaining > 0 ? remaining : 0}</td>
<td>${percent}%</td>
<td class="${statusClass}">${statusText}</td>
</tr>
`;

});

}

updateTable();
setInterval(updateTable,60000);

</script>
    
</body>
</html>
